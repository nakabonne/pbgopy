version: 2
before:
  hooks:
    - go mod tidy
builds:
- id: pbgopy
  main: .
  binary: pbgopy
  goos:
    - freebsd
    - darwin
    - linux
    - windows
  goarch:
    - amd64
    - arm
    - arm64
    - 386
    - ppc64le
    - s390x
    - mips64
    - mips64le
  goarm:
    - 6
    - 7
  ignore:
    - goos: windows
      goarch: arm
  env:
    - CGO_ENABLED=0
  ldflags:
    - -X github.com/linuxsuren/cobra-extension/version.version={{.Version}}
    - -X github.com/linuxsuren/cobra-extension/version.commit={{.ShortCommit}}
    - -X github.com/linuxsuren/cobra-extension/version.date={{.Date}}
    - -s -w

archives:
- name_template: >-
    {{ .ProjectName }}_
    {{- .Version }}_
    {{- .Os }}_
    {{- if eq .Arch "386" }}32-bit
    {{- else }}{{ .Arch }}{{ end }}
    {{- with .Arm }}v{{ . }}{{ end }}

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ .Version }}-next"

brews:
  - repository:
      owner: nakabonne
      name: homebrew-pbgopy
    homepage: "https://github.com/nakabonne/pbgopy"
    description: "Copy and paste between devices"

nfpms:
  - license: MIT
    maintainer: Ryo Nakao <ryo@nakao.dev>
    homepage: https://github.com/nakabonne/pbgopy
    description: "Copy and paste between devices"
    formats:
      - rpm
      - deb

dockers_v2:
  - dockerfile: Dockerfile
    ids:
      - pbgopy
    images:
      - "nakabonne/pbgopy"
    tags:
      - "latest"
      - "{{ .Tag }}"
      - "v{{ .Major }}.{{ .Minor }}"
    sbom: false
